name: Build, Test, and Deploy Blazor App

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Blazor app dependencies
        run: dotnet restore Demo.BlazorWasmApp/Demo.BlazorWasmApp.csproj

      - name: Build Blazor app
        run: dotnet build Demo.BlazorWasmApp/Demo.BlazorWasmApp.csproj --configuration Release --no-restore

      - name: Run Tests
        run: |
          dotnet restore Demo.BlazorWasmApp.Tests/Demo.BlazorWasmApp.Tests.csproj
          dotnet test Demo.BlazorWasmApp.Tests/Demo.BlazorWasmApp.Tests.csproj --no-restore --verbosity normal

      - name: Publish Blazor app
        run: dotnet publish Demo.BlazorWasmApp/Demo.BlazorWasmApp.csproj -c Release -o publish

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
