name: Deploy Blazor to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Blazor project dependencies
        run: dotnet restore Demo.BlazorWasmApp.Playground/Demo.BlazorWasmApp.Playground.csproj

      - name: Build Blazor project
        run: dotnet build Demo.BlazorWasmApp.Playground/Demo.BlazorWasmApp.Playground.csproj --configuration Release --no-restore

      - name: Publish Blazor project
        run: dotnet publish Demo.BlazorWasmApp.Playground/Demo.BlazorWasmApp.Playground.csproj -c Release -o publish

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
